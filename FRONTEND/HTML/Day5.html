<html>
<head>
  <title>FORM</title>
</head>
<body style="background-color: cyan">
  <h1><b>MSU ADMISSION FORM</b></h1>
   <form method="post">
      <div>
        <label for="FIRSTNAME">ENTER FIRST NAME</label>
        <input type="text" name="First name" id="FIRSTNAME">
      </div>
      <br>
      <div>
        <label for="MIDDLENAME">ENTER MIDDLE NAME</label>
        <input type="text" name="Middle name" id="MIDDLENAME">
      </div>
      <br>
      <div>
        <label for="LASTNAME">ENTER LAST NAME</label>
        <input type="text" name="Last name" id="LASTNAME">
      </div>
      <br>
      <div>
        <label for="gender">GENDER:  </label>
        <input type="radio" id="Male" name="gender" value="Male">
        <label for="Male">MALE</label>
        <input type="radio" id="Female" name="gender" value="Female">
        <label for="Female">FEMALE</label>
      </div>
      <br>
      <div>
        <label for="mobilenumber">ENTER YOUR MOBILE NUMBER</label>
        <input type="tel" id="mobilenumber" name="mobile num" maxlength="10" pattern="\d{10}">
      </div>
      <br>
      <div>
        <label for="checkbox">ARE YOU INDIAN??</label>
        <input type="checkbox" id="checkbox" name="checkbox">
      </div>
      <br>
      <div>
        <label for="address">ENTER YOUR ADDRESS HERE </label>
        <textarea name="address" id="address" rows="5" cols="30"></textarea>
       </div>
       <br>
       <div>
         <select name="faculty">
           <option value="" selected>CHOOSE FACULTY</option>
           <option value="faculty of commerce">faculty of commerce</option>
           <option value="faculty of arts">faculty of arts</option>
           <option value="faculty of technology and engineering">faculty of technology and engineering</option>
           <option value="faculty ofscience">faculty of science</option>
         </select>
       </div>
       <br>
       <div>
         <button type="submit">SUBMIT</button>
         <button type="reset">RESET</button>
       </div>
   </form>
</body>
</html>
